{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Pro - Administrator Login</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'employees/styles.css' %}">
</head>
<body class="login-container">
    {% if messages %}
    <div class="messages-container">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">
            <span>{{ message }}</span>
            <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="login-card">
        <div class="login-header">
            <div class="brand-logo">E</div>
            <h2>Welcome to EMS Pro</h2>
            <p>Sign in to manage your workforce</p>
        </div>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-grid" style="grid-template-columns: 1fr; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4);"></i>
                        <input type="text" id="username" name="username" class="form-input" style="padding-left: 2.5rem;" required placeholder="e.g., admin">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4);"></i>
                        <input type="password" id="password" name="password" class="form-input" style="padding-left: 2.5rem;" required placeholder="••••••••">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; margin-top: 0.5rem;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>
    </div>

    <script>
        // Dismiss alerts after 4 seconds
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(function(alert) {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateX(100%)';
                    alert.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    setTimeout(() => alert.remove(), 500);
                });
            }, 4000);
        });
    </script>
</body>
</html>
